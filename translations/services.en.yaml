generate_snapkey:
  name: Generate temporary password
  description: Generate a temporary password for a door lock.
  fields:
    device_id:
      name: Device ID
      description: The device serial number.
    name:
      name: Key name
      description: Name of the key.
    effective_num:
      name: Effective number
      description: Number of times the key can be used (-1 for unlimited).
    effective_day:
      name: Effective days
      description: Number of days the key is valid (1-90).
    effect_period:
      name: Effect period
      description: List of periods with day, beginTime, endTime.
    begin_time:
      name: Begin time
      description: Start time in HH:mm:ss format.
    end_time:
      name: End time
      description: End time in HH:mm:ss format.

get_snapkey_list:
  name: Get temporary password list
  description: Retrieve list of temporary passwords for a door lock.
  fields:
    device_id:
      name: Device ID
      description: The device serial number.

open_door_remote:
  name: Remote open door
  description: Remotely open the door lock.
  fields:
    device_id:
      name: Device ID
      description: The device serial number.

wake_up_device:
  name: Wake up device
  description: Wake up a sleeping door lock.
  fields:
    device_id:
      name: Device ID
      description: The device serial number.

get_open_door_record:
  name: Get open door records
  description: Retrieve recent door open records.
  fields:
    device_id:
      name: Device ID
      description: The device serial number.
    count:
      name: Number of records
      description: How many recent records to retrieve (max 100).