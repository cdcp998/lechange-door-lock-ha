generate_snapkey:
  name: Generate temporary password
  description: Generate a temporary password for a door lock.
  fields:
    device_id:
      name: Device ID
      description: The device serial number.
      required: true
      example: "600EBBDRSF84812"
      selector:
        text:
    name:
      name: Key name
      description: Name of the key.
      required: true
      example: "Guest key"
      selector:
        text:
    effective_num:
      name: Effective number
      description: Number of times the key can be used (-1 for unlimited).
      required: true
      example: -1
      selector:
        number:
          min: -1
          max: 100
    effective_day:
      name: Effective days
      description: Number of days the key is valid (1-90).
      required: true
      example: 7
      selector:
        number:
          min: 1
          max: 90
    effect_period:
      name: Effect period
      description: List of periods with day, beginTime, endTime.
      required: true
      example: '[{"period":"Monday","beginTime":"12:00:00","endTime":"18:00:00"}]'
      selector:
        object:
    begin_time:
      name: Begin time
      description: Start time in HH:mm:ss format.
      required: true
      example: "12:00:00"
      selector:
        text:
    end_time:
      name: End time
      description: End time in HH:mm:ss format.
      required: true
      example: "18:00:00"
      selector:
        text:

